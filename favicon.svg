<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PM neural node">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="glow" cx="32" cy="32" r="14" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0e14"/>
  <!-- subtle central glow -->
  <circle cx="32" cy="32" r="14" fill="url(#glow)"/>
  <!-- edges -->
  <g stroke="url(#g)" stroke-width="1.6" stroke-linecap="round" opacity="0.7">
    <line x1="32" y1="32" x2="14" y2="14"/>
    <line x1="32" y1="32" x2="50" y2="14"/>
    <line x1="32" y1="32" x2="14" y2="50"/>
    <line x1="32" y1="32" x2="50" y2="50"/>
  </g>
  <!-- outer nodes -->
  <circle cx="14" cy="14" r="3.2" fill="#22d3ee"/>
  <circle cx="50" cy="14" r="3.2" fill="#22d3ee"/>
  <circle cx="14" cy="50" r="3.2" fill="#10b981"/>
  <circle cx="50" cy="50" r="3.2" fill="#10b981"/>
  <!-- central node -->
  <circle cx="32" cy="32" r="5" fill="url(#g)"/>
</svg>
